uniform.vec2.refraxViewSize = vec2(viewWidth, viewHeight)
uniform.float.refraxWetBiome = if(biome_precipitation == PPT_RAIN, 1.0, 0.0)
variable.float.refraxSunNorm = 1.0 / sqrt(sunPosition.x * sunPosition.x + sunPosition.y * sunPosition.y + sunPosition.z * sunPosition.z)
variable.float.refraxSunVX = sunPosition.x * refraxSunNorm
variable.float.refraxSunVY = sunPosition.y * refraxSunNorm
variable.float.refraxSunVZ = sunPosition.z * refraxSunNorm
variable.float.refraxSunX = gbufferModelViewInverse.0.0 * refraxSunVX + gbufferModelViewInverse.1.0 * refraxSunVY + gbufferModelViewInverse.2.0 * refraxSunVZ
variable.float.refraxSunY = gbufferModelViewInverse.0.1 * refraxSunVX + gbufferModelViewInverse.1.1 * refraxSunVY + gbufferModelViewInverse.2.1 * refraxSunVZ
variable.float.refraxSunZ = gbufferModelViewInverse.0.2 * refraxSunVX + gbufferModelViewInverse.1.2 * refraxSunVY + gbufferModelViewInverse.2.2 * refraxSunVZ
uniform.vec3.refraxSunDir = vec3(refraxSunX, refraxSunY, refraxSunZ)
variable.float.refraxLightX = if(sunAngle < 0.5, refraxSunX, -refraxSunX)
variable.float.refraxLightY = if(sunAngle < 0.5, refraxSunY, -refraxSunY)
variable.float.refraxLightZ = if(sunAngle < 0.5, refraxSunZ, -refraxSunZ)
uniform.vec3.refraxLightDir = vec3(refraxLightX, refraxLightY, refraxLightZ)
uniform.int.refraxFrameCounter = frameCounter
uniform.float.refraxFrameTimeCounter = frameTimeCounter
uniform.float.refraxFar = far
uniform.vec3.refraxCameraPosition = cameraPosition
uniform.vec4.refraxModelViewInv0 = vec4(gbufferModelViewInverse.0.0, gbufferModelViewInverse.0.1, gbufferModelViewInverse.0.2, gbufferModelViewInverse.0.3)
uniform.vec4.refraxModelViewInv1 = vec4(gbufferModelViewInverse.1.0, gbufferModelViewInverse.1.1, gbufferModelViewInverse.1.2, gbufferModelViewInverse.1.3)
uniform.vec4.refraxModelViewInv2 = vec4(gbufferModelViewInverse.2.0, gbufferModelViewInverse.2.1, gbufferModelViewInverse.2.2, gbufferModelViewInverse.2.3)
uniform.vec4.refraxModelViewInv3 = vec4(gbufferModelViewInverse.3.0, gbufferModelViewInverse.3.1, gbufferModelViewInverse.3.2, gbufferModelViewInverse.3.3)
